<!-- iOS splash screens (fundo da cor do app enquanto carrega) -->
<style>
  @media (display-mode: standalone) {
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
    .sidebar { padding-top: env(safe-area-inset-top); top: env(safe-area-inset-top); }
    .topbar { padding-top: env(safe-area-inset-top); height: calc(56px + env(safe-area-inset-top)); }
  }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F2ED;
  --sidebar:#18171A;
  --sidebar-hover:#2A2830;
  --accent:#B45309;
  --accent-light:#FEF3C7;
  --accent2:#7C3AED;
  --accent2-light:#EDE9FE;
  --green:#059669;
  --green-light:#ECFDF5;
  --surface:#FFFFFF;
  --surface2:#FAF9F7;
  --border:#E8E4DF;
  --text:#1C1917;
  --text2:#78716C;
  --text3:#A8A29E;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
  --shadow-lg:0 10px 30px rgba(0,0,0,.1),0 4px 8px rgba(0,0,0,.05);
  --radius:10px;
  --radius-sm:6px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit}
input,textarea{font-family:inherit}
a{text-decoration:none;color:inherit}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;flex-shrink:0;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,.06)}
.sidebar-logo .logo-mark{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{color:#fff}
.logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:#fff;letter-spacing:-.2px}
.sidebar-nav{flex:1;padding:12px 12px;overflow-y:auto}
.nav-section{margin-bottom:8px}
.nav-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase;padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:7px;color:rgba(255,255,255,.6);font-size:13.5px;font-weight:400;cursor:pointer;transition:all .15s;border:none;background:transparent;width:100%;text-align:left}
.nav-item:hover{background:var(--sidebar-hover);color:rgba(255,255,255,.85)}
.nav-item.active{background:rgba(180,83,9,.18);color:#FCD34D;font-weight:500}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.sidebar-user{padding:12px;border-top:1px solid rgba(255,255,255,.06)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;cursor:pointer;transition:background .15s}
.user-card:hover{background:var(--sidebar-hover)}
.user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-size:13px;font-weight:500;color:rgba(255,255,255,.85);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:rgba(255,255,255,.35)}

.main{margin-left:240px;flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;letter-spacing:-.2px}
.topbar-actions{display:flex;align-items:center;gap:10px}
.content{padding:28px;flex:1}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:500;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#92400E}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--bg);border-color:var(--text3)}
.btn-ghost{background:transparent;color:var(--text2);padding:7px 12px}
.btn-ghost:hover{background:var(--bg);color:var(--text)}
.btn-danger{background:#FEE2E2;color:#B91C1C;border:1px solid #FECACA}
.btn-danger:hover{background:#FECACA}
.btn-sm{padding:6px 12px;font-size:12.5px}
.btn-lg{padding:11px 22px;font-size:14.5px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-icon{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius-sm);background:var(--bg);border:1px solid var(--border);color:var(--text2);transition:all .15s}
.btn-icon:hover{background:var(--surface);border-color:var(--text3);color:var(--text)}
.btn-icon.accent{background:var(--accent-light);border-color:#FCD34D;color:var(--accent)}
.btn-icon.accent:hover{background:#FDE68A}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.card-hover{transition:all .2s}
.card-hover:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:500}
.badge-amber{background:var(--accent-light);color:#92400E}
.badge-purple{background:var(--accent2-light);color:var(--accent2)}
.badge-green{background:var(--green-light);color:var(--green)}
.badge-gray{background:var(--bg);color:var(--text2);border:1px solid var(--border)}
.badge-blue{background:#EFF6FF;color:#1D4ED8}

/* FORMS */
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:var(--text)}
.form-input{padding:9px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;color:var(--text);background:var(--surface);transition:border .15s;outline:none}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(180,83,9,.1)}
.form-textarea{resize:vertical;min-height:80px}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(at 40% 20%,rgba(180,83,9,.06) 0,transparent 60%),radial-gradient(at 80% 80%,rgba(124,58,237,.04) 0,transparent 50%)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);padding:40px;width:360px;max-width:calc(100vw - 40px)}
.login-logo{display:flex;justify-content:center;margin-bottom:24px}
.login-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;text-align:center;margin-bottom:6px}
.login-sub{color:var(--text2);text-align:center;font-size:14px;margin-bottom:28px}
.login-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-size:12px}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border)}

/* DASHBOARD */
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:20px}
.project-card{padding:20px;cursor:pointer;position:relative;overflow:hidden}
.project-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.project-card:hover::before{opacity:1}
.project-card-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.project-card-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;letter-spacing:-.1px;line-height:1.4}
.project-card-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:14px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.project-card-meta{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.project-card-stat{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.project-actions{display:flex;gap:6px;opacity:0;transition:opacity .2s}
.project-card:hover .project-actions{opacity:1}
.empty-state{text-align:center;padding:64px 20px;color:var(--text2)}
.empty-icon{width:56px;height:56px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;border:1px solid var(--border)}
.empty-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-sub{font-size:13.5px;margin-bottom:20px}

/* PROJECT EDITOR */
.editor-layout{display:flex;flex-direction:column;gap:0}
.editor-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.editor-back{background:transparent;border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13.5px;padding:6px 0;transition:color .15s}
.editor-back:hover{color:var(--text)}
.editor-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;letter-spacing:-.2px}
.editor-desc{font-size:13px;color:var(--text2);margin-top:2px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:20px;width:fit-content}
.tab{padding:7px 16px;border-radius:6px;font-size:13.5px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:7px}
.tab:hover{color:var(--text)}
.tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

/* FILE SECTION */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:36px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(180,83,9,.02)}
.upload-zone-icon{width:48px;height:48px;background:var(--bg);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;border:1px solid var(--border)}
.upload-zone h3{font-size:15px;font-weight:600;margin-bottom:4px}
.upload-zone p{font-size:13px;color:var(--text2)}

.file-list{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.file-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .2s}
.file-item:hover{border-color:var(--text3);box-shadow:var(--shadow)}
.file-order{width:24px;height:24px;background:var(--bg);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--text2);flex-shrink:0;border:1px solid var(--border)}
.file-icon{width:36px;height:36px;background:#EFF6FF;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.file-info{flex:1;min-width:0}
.file-name{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.file-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.file-size{font-size:11.5px;color:var(--text2)}
.file-reorder{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.file-reorder button{width:24px;height:22px;border:1px solid var(--border);background:var(--bg);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;transition:all .15s}
.file-reorder button:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}
.file-reorder button:disabled{opacity:.3;cursor:default}
.processing-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--accent)}
.spinner{width:12px;height:12px;border:2px solid rgba(180,83,9,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* READING VIEW */
.reading-container{max-width:720px;margin:0 auto}
.reading-header{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;margin-bottom:20px;text-align:center}
.reading-book-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;letter-spacing:-.3px;margin-bottom:8px}
.reading-book-sub{color:var(--text2);font-size:14px}
.reading-stats{display:flex;justify-content:center;gap:20px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.reading-stat{text-align:center}
.reading-stat-val{font-size:18px;font-weight:700;color:var(--accent)}
.reading-stat-label{font-size:11.5px;color:var(--text2);margin-top:2px}

.section-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-bottom:16px;position:relative;overflow:hidden}
.section-block::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--accent),var(--accent2));opacity:.3}
.section-header{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.section-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;letter-spacing:-.1px}
.section-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.section-content{font-size:14.5px;line-height:1.85;color:#292524;font-family:'DM Sans',sans-serif}
.section-content p{margin-bottom:12px}
.section-content p:last-child{margin-bottom:0}

/* VERSIONS */
.versions-list{display:flex;flex-direction:column;gap:10px}
.version-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.version-number{font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--accent);background:var(--accent-light);padding:4px 10px;border-radius:6px;flex-shrink:0}
.version-meta{flex:1}
.version-date{font-size:13.5px;font-weight:500;margin-bottom:2px}
.version-info{font-size:12px;color:var(--text2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal{background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);padding:28px;width:440px;max-width:calc(100vw - 32px);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:13.5px;color:var(--text2);margin-bottom:20px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* ALERTS */
.alert{padding:12px 16px;border-radius:8px;font-size:13.5px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.alert-error{background:#FEE2E2;border:1px solid #FECACA;color:#B91C1C}
.alert-success{background:var(--green-light);border:1px solid #A7F3D0;color:#065F46}
.alert-info{background:#EFF6FF;border:1px solid #BFDBFE;color:#1E40AF}
.alert-warning{background:var(--accent-light);border:1px solid #FDE68A;color:#92400E}

/* MISC */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.page-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;letter-spacing:-.2px}
.page-sub{font-size:13.5px;color:var(--text2);margin-top:3px}
.divider{height:1px;background:var(--border);margin:20px 0}
.skeleton{background:linear-gradient(90deg,var(--bg) 25%,var(--border) 50%,var(--bg) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}to{background-position:-200% 0}}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-amber{background:var(--accent)}
.dot-green{background:var(--green)}
.dot-gray{background:var(--text3)}
.dot-purple{background:var(--accent2)}

/* ASSEMBLING OVERLAY */
.assembling-overlay{position:fixed;inset:0;background:rgba(28,25,23,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(4px)}
.assembling-card{background:var(--surface);border-radius:16px;padding:40px;text-align:center;width:320px;box-shadow:var(--shadow-lg)}
.assembling-animation{width:60px;height:60px;margin:0 auto 20px;position:relative}
.assembling-animation .ring{position:absolute;inset:0;border-radius:50%;border:3px solid transparent}
.assembling-animation .ring1{border-top-color:var(--accent);animation:spin .8s linear infinite}
.assembling-animation .ring2{border-bottom-color:var(--accent2);animation:spin 1.2s linear infinite reverse;inset:6px}
.assembling-animation .ring3{border-right-color:var(--green);animation:spin 1.8s linear infinite;inset:12px}
.assembling-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;margin-bottom:6px}
.assembling-sub{font-size:13px;color:var(--text2)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>

// ─── ANTHROPIC API ─────────────────────────────────────────────────────────
async function analyzeContent(fileName, textContent) {
  try {
    const resp = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{
          role: "user",
          content: `Você é um assistente especialista em organização de livros didáticos.
Analise o seguinte conteúdo e retorne APENAS um JSON válido (sem markdown, sem explicação).

Nome do arquivo: ${fileName}
Trecho do conteúdo (pode estar parcial ou vazio): ${textContent.slice(0, 2000)}

Retorne este JSON exatamente:
{
  "theme": "tema principal do conteúdo em português (ex: Matemática, História do Brasil, Biologia Celular)",
  "chapter": "título do capítulo sugerido em português (ex: Capítulo 1 - Fundamentos)",
  "summary": "resumo de 2 a 3 linhas do conteúdo em português",
  "keywords": ["palavra1", "palavra2", "palavra3"]
}`
        }]
      })
    });
    const data = await resp.json();
    const text = data.content?.[0]?.text || '{}';
    const clean = text.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch(e) {
    const name = fileName.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ');
    return {
      theme: "Conteúdo Educacional",
      chapter: `Capítulo - ${name}`,
      summary: `Seção referente ao arquivo "${fileName}"`,
      keywords: ["educação", "aprendizado"]
    };
  }
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
let idCounter = Date.now();
const uid = () => ++idCounter;
const fmt = (bytes) => {
  if(bytes < 1024) return bytes + ' B';
  if(bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
};
const fmtDate = (d) => new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
const fmtTime = (d) => new Date(d).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

// ─── STATUS BADGE ─────────────────────────────────────────────────────────
const StatusBadge = ({status}) => {
  const map = {
    draft: ['badge-gray','dot-gray','Rascunho'],
    in_progress: ['badge-amber','dot-amber','Em andamento'],
    completed: ['badge-green','dot-green','Concluído']
  };
  const [cls,dotCls,label] = map[status] || map.draft;
  return <span className={`badge ${cls}`}><span className={`dot ${dotCls}`}/>{label}</span>;
};

// ─── PROJECT EDITOR ───────────────────────────────────────────────────────
const ProjectEditor = ({project, onBack, onUpdate}) => {
  const [activeTab, setActiveTab] = useState('files');
  const [files, setFiles] = useState(project.files || []);
  const [versions, setVersions] = useState(project.versions || []);
  const [processingIds, setProcessingIds] = useState(new Set());
  const [isAssembling, setIsAssembling] = useState(false);
  const [drag, setDrag] = useState(false);
  const [alert, setAlert] = useState(null);
  const [deleteFileId, setDeleteFileId] = useState(null);
  const fileInputRef = useRef(null);

  const showAlert = (type, msg, duration=4000) => {
    setAlert({type, msg});
    setTimeout(()=>setAlert(null), duration);
  };

  // Persist to parent
  useEffect(() => {
    onUpdate(project.id, {files, versions, status: versions.length > 0 ? 'in_progress' : project.status});
  }, [files, versions]);

  const processFile = async (file) => {
    const tempId = uid();
    const processingFile = {
      id: tempId,
      name: file.name,
      size: file.size,
      orderIndex: files.length,
      theme: null,
      chapter: null,
      summary: null,
      keywords: [],
      content: '',
      uploadedAt: Date.now(),
      processing: true
    };
    setFiles(prev => [...prev, processingFile]);
    setProcessingIds(prev => new Set([...prev, tempId]));

    let textContent = '';
    try {
      if(typeof mammoth !== 'undefined') {
        const ab = await file.arrayBuffer();
        const result = await mammoth.extractRawText({arrayBuffer: ab});
        textContent = result.value || '';
      }
    } catch(e) { textContent = ''; }

    let analysis;
    try {
      analysis = await analyzeContent(file.name, textContent);
    } catch(e) {
      analysis = {theme:'Conteúdo', chapter:`Capítulo - ${file.name.replace(/\.[^.]+$/,'')}`, summary:'', keywords:[]};
    }

    setFiles(prev => prev.map(f => f.id === tempId ? {
      ...f,
      theme: analysis.theme,
      chapter: analysis.chapter,
      summary: analysis.summary,
      keywords: analysis.keywords || [],
      content: textContent,
      processing: false
    } : f));
    setProcessingIds(prev => { const s = new Set(prev); s.delete(tempId); return s; });
  };

  const handleFiles = async (fileList) => {
    const accepted = Array.from(fileList).filter(f => f.name.endsWith('.docx'));
    const rejected = Array.from(fileList).filter(f => !f.name.endsWith('.docx'));
    if(rejected.length > 0) showAlert('error', `${rejected.length} arquivo(s) ignorado(s). Apenas arquivos .docx são suportados.`);
    if(accepted.length > 0) {
      for(const f of accepted) await processFile(f);
      showAlert('success', `${accepted.length} arquivo(s) carregado(s) com sucesso!`);
    }
  };

  const moveFile = (idx, dir) => {
    const newFiles = [...files];
    const target = idx + dir;
    if(target < 0 || target >= newFiles.length) return;
    [newFiles[idx], newFiles[target]] = [newFiles[target], newFiles[idx]];
    setFiles(newFiles.map((f,i) => ({...f, orderIndex:i})));
  };

  const deleteFile = (id) => {
    setFiles(prev => prev.filter(f => f.id !== id).map((f,i) => ({...f, orderIndex:i})));
    setDeleteFileId(null);
    showAlert('success', 'Arquivo removido.');
  };

  const assembleBook = async () => {
    if(files.length === 0) { showAlert('error','Adicione pelo menos um arquivo antes de montar o livro.'); return; }
    if(processingIds.size > 0) { showAlert('warning','Aguarde o processamento dos arquivos em andamento.'); return; }
    setIsAssembling(true);
    await new Promise(r => setTimeout(r, 1800));

    const sections = files.map((f, i) => ({
      id: uid(),
      title: f.chapter || `Seção ${i+1}`,
      theme: f.theme || 'Geral',
      chapter: f.chapter || `Seção ${i+1}`,
      content: f.content || `Conteúdo do arquivo "${f.name}".`,
      summary: f.summary || '',
      keywords: f.keywords || [],
      sourceFileId: f.id,
      orderIndex: i
    }));

    const versionNum = versions.length + 1;
    const version = {
      id: uid(),
      number: versionNum,
      description: `Versão ${versionNum} — ${files.length} arquivo(s)`,
      sections,
      fileCount: files.length,
      createdAt: Date.now()
    };
    setVersions(prev => [...prev, version]);
    setIsAssembling(false);
    setActiveTab('reading');
    showAlert('success', `Livro montado com sucesso! Versão ${versionNum} criada.`);
  };

  const latestVersion = versions[versions.length - 1];

  const downloadBook = async (version) => {
    if(!version) return;
    let content = `BOOK BUILDER - ${project.title}\n`;
    content += '='.repeat(50) + '\n\n';
    content += `Versão: ${version.number}\n`;
    content += `Data: ${fmtDate(version.createdAt)}\n\n`;
    content += '='.repeat(50) + '\n\n';
    version.sections.forEach((s, i) => {
      content += `\n${i+1}. ${s.title}\n`;
      content += '-'.repeat(40) + '\n';
      content += `Tema: ${s.theme}\n\n`;
      content += s.content + '\n\n';
    });
    const blob = new Blob([content], {type:'text/plain'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `${project.title.replace(/\s+/g,'_')}_v${version.number}.txt`;
    a.click(); URL.revokeObjectURL(url);
    showAlert('success', 'Download iniciado!');
  };

  const rollback = (versionId) => {
    const v = versions.find(x => x.id === versionId);
    if(!v) return;
    setVersions(prev => {
      const idx = prev.findIndex(x => x.id === versionId);
      return prev.slice(0, idx+1);
    });
    showAlert('success', `Revertido para versão ${v.number}.`);
    setActiveTab('reading');
  };

  return (
    <>
      {isAssembling && (
        <div className="assembling-overlay">
          <div className="assembling-card">
            <div className="assembling-animation">
              <div className="ring ring1"/><div className="ring ring2"/><div className="ring ring3"/>
            </div>
            <h3 className="assembling-title">Montando o livro…</h3>
            <p className="assembling-sub">Combinando seções e estruturando o conteúdo</p>
          </div>
        </div>
      )}

      <div className="editor-header">
        <button className="editor-back" onClick={onBack}><Icon name="chevronLeft" size={16}/>Projetos</button>
        <div style={{flex:1}}>
          <h1 className="editor-title">{project.title}</h1>
          {project.description && <p className="editor-desc">{project.description}</p>}
        </div>
        <div style={{display:'flex',gap:10,alignItems:'center'}}>
          <StatusBadge status={project.status}/>
          {files.length > 0 && (
            <button className="btn btn-primary" onClick={assembleBook} disabled={processingIds.size > 0}>
              <Icon name="layers" size={15}/> Montar Livro
            </button>
          )}
          {latestVersion && (
            <button className="btn btn-secondary" onClick={()=>downloadBook(latestVersion)}>
              <Icon name="download" size={14}/>Download .docx
            </button>
          )}

// ─── STORAGE HELPERS ──────────────────────────────────────────────────────
const STORAGE_KEYS = { projects:'bb_projects', currentId:'bb_current_id', ghToken:'bb_gh_token', gistId:'bb_gist_id' };
const load = (key, fallback) => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; } };
const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

// ─── GITHUB GIST API ──────────────────────────────────────────────────────
const GIST_FILENAME = 'book-builder-data.json';

const gistPush = async (token, gistId, projects) => {
  const body = { files: { [GIST_FILENAME]: { content: JSON.stringify({v:1, savedAt: Date.now(), projects}) } } };
  if (gistId) {
    const r = await fetch(`https://api.github.com/gists/${gistId}`, {
      method:'PATCH', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error('Falha ao salvar no Gist');
    return gistId;
  } else {
    const r = await fetch('https://api.github.com/gists', {
      method:'POST', headers:{'Authorization':`token ${token}`,'Content-Type':'application/json'},
      body: JSON.stringify({...body, description:'Book Builder - dados sincronizados', public: false})
    });
    if (!r.ok) throw new Error('Falha ao criar Gist');
    const data = await r.json();
    return data.id;
  }
};

const gistPull = async (token, gistId) => {
  const r = await fetch(`https://api.github.com/gists/${gistId}`, {
    headers:{'Authorization':`token ${token}`}
  });
  if (!r.ok) throw new Error('Gist não encontrado');
  const data = await r.json();
  const content = data.files[GIST_FILENAME]?.content;
  if (!content) throw new Error('Arquivo não encontrado no Gist');
  const parsed = JSON.parse(content);
  if (!parsed.projects) throw new Error('Formato inválido');
  return parsed.projects;
};

// ─── CLOUD SETUP MODAL ────────────────────────────────────────────────────
const CloudModal = ({onClose, onSaved, initialToken, initialGistId}) => {
  const [token, setToken] = useState(initialToken || '');
  const [gistId, setGistId] = useState(initialGistId || '');
  const [status, setStatus] = useState(''); // 'loading' | 'ok' | 'error'
  const [msg, setMsg] = useState('');

  const handleSave = async () => {
    if (!token.trim()) return;
    setStatus('loading'); setMsg('Validando token…');
    try {
      const r = await fetch('https://api.github.com/user', { headers:{'Authorization':`token ${token.trim()}`} });
      if (!r.ok) throw new Error('Token inválido ou sem permissão de Gist.');
      const u = await r.json();
      setMsg(`Conectado como @${u.login} ✓`);
      setStatus('ok');
      onSaved(token.trim(), gistId.trim());
    } catch(e) {
      setStatus('error'); setMsg(e.message);
    }
  };

  return (
    <Modal title="☁️ Sincronização na Nuvem" onClose={onClose}
      subtitle="Configure uma vez e seus dados ficam salvos no GitHub automaticamente.">

      <div className="alert alert-info" style={{marginBottom:16}}>
        <Icon name="info" size={14}/>
        <div>
          <strong>Como funciona:</strong> seus projetos ficam salvos num arquivo privado (Gist) na sua conta do GitHub. Qualquer dispositivo com o mesmo token acessa os mesmos dados.
        </div>
      </div>

      <div className="form-group">
        <label className="form-label">1. Crie um Personal Access Token no GitHub</label>
        <div style={{background:'var(--bg)',border:'1px solid var(--border)',borderRadius:8,padding:12,fontSize:13,color:'var(--text2)',lineHeight:1.7}}>
          Acesse: <a href="https://github.com/settings/tokens/new" target="_blank" style={{color:'var(--accent)',fontWeight:500}}>github.com/settings/tokens/new</a><br/>
          → <strong>Token name:</strong> Book Builder<br/>
          → Marque apenas: <span className="badge badge-green" style={{fontSize:11}}>✓ gist</span><br/>
          → Clique <strong>Generate token</strong> e copie o token
        </div>
      </div>

      <div className="form-group">
        <label className="form-label">2. Cole o token aqui</label>
        <input className="form-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
          value={token} onChange={e=>{setToken(e.target.value);setStatus('');setMsg('');}}/>
      </div>

      <div className="form-group" style={{marginBottom:4}}>
        <label className="form-label">ID do Gist existente <span style={{color:'var(--text2)',fontWeight:400}}>(deixe vazio para criar novo)</span></label>
        <input className="form-input" placeholder="a1b2c3d4e5f6… (opcional)" value={gistId} onChange={e=>setGistId(e.target.value)}/>
      </div>

      {msg && (
        <div className={`alert alert-${status==='ok'?'success':status==='error'?'error':'info'}`} style={{marginTop:12}}>
          {status==='loading' && <span className="spinner"/>}
          {status==='ok' && <Icon name="check" size={14}/>}
          {status==='error' && <Icon name="alertCircle" size={14}/>}
          {msg}
        </div>
      )}

      <div className="modal-footer">
        <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={handleSave} disabled={!token.trim() || status==='loading'}>
          {status==='loading' ? <><span className="spinner" style={{borderTopColor:'#fff',borderColor:'rgba(255,255,255,.3)'}}/> Validando…</> : <><Icon name="check" size={14}/>Salvar e conectar</>}
        </button>
      </div>
    </Modal>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────
const App = () => {
  const [projects, setProjects]           = useState(() => load(STORAGE_KEYS.projects, []));
  const [currentProjectId, setCurrentProjectId] = useState(() => load(STORAGE_KEYS.currentId, null));
  const [ghToken, setGhToken]             = useState(() => load(STORAGE_KEYS.ghToken, ''));
  const [gistId, setGistId]               = useState(() => load(STORAGE_KEYS.gistId, ''));
  const [showCloud, setShowCloud]         = useState(false);
  const [cloudStatus, setCloudStatus]     = useState('idle'); // 'idle'|'syncing'|'ok'|'error'
  const [cloudMsg, setCloudMsg]           = useState('');
  const syncTimeout = useRef(null);

  // Persist local
  useEffect(() => { save(STORAGE_KEYS.projects, projects); }, [projects]);
  useEffect(() => { save(STORAGE_KEYS.currentId, currentProjectId); }, [currentProjectId]);

  // Auto-push to Gist 2s after any project change
  useEffect(() => {
    if (!ghToken) return;
    clearTimeout(syncTimeout.current);
    syncTimeout.current = setTimeout(async () => {
      setCloudStatus('syncing');
      try {
        const newGistId = await gistPush(ghToken, gistId, projects);
        if (newGistId !== gistId) {
          setGistId(newGistId);
          save(STORAGE_KEYS.gistId, JSON.stringify(newGistId));
        }
        setCloudStatus('ok');
        setCloudMsg('Salvo na nuvem ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}));
      } catch(e) {
        setCloudStatus('error');
        setCloudMsg('Erro ao salvar na nuvem');
      }
    }, 2000);
  }, [projects, ghToken]);

  // Pull from Gist on first load if configured
  useEffect(() => {
    if (!ghToken || !gistId) return;
    setCloudStatus('syncing');
    gistPull(ghToken, gistId).then(remoteProjects => {
      setProjects(remoteProjects);
      setCloudStatus('ok');
      setCloudMsg('Dados carregados da nuvem');
    }).catch(() => {
      setCloudStatus('error');
      setCloudMsg('Não foi possível carregar da nuvem');
    });
  }, []); // only on mount

  const handleCloudSaved = (token, existingGistId) => {
    save(STORAGE_KEYS.ghToken, JSON.stringify(token));
    save(STORAGE_KEYS.gistId, JSON.stringify(existingGistId));
    setGhToken(token); setGistId(existingGistId);
    setShowCloud(false);
    // Push current data immediately
    gistPush(token, existingGistId, projects).then(id => {
      setGistId(id); save(STORAGE_KEYS.gistId, JSON.stringify(id));
      setCloudStatus('ok'); setCloudMsg('Conectado e salvo na nuvem ✓');
    }).catch(() => { setCloudStatus('error'); setCloudMsg('Erro na primeira sincronização'); });
  };

  const currentProject = projects.find(p => p.id === currentProjectId);
  const createProject  = (data) => setProjects(prev => [...prev, data]);
  const editProject    = (id, data) => setProjects(prev => prev.map(p => p.id===id ? {...p,...data} : p));
  const deleteProject  = (id) => { setProjects(prev => prev.filter(p => p.id!==id)); if(currentProjectId===id) setCurrentProjectId(null); };
  const updateProject  = (id, data) => setProjects(prev => prev.map(p => p.id===id ? {...p,...data} : p));

  const cloudIcon = cloudStatus==='syncing' ? <span className="spinner" style={{width:11,height:11,borderWidth:2}}/> 
                  : cloudStatus==='ok'      ? '☁️' 
                  : cloudStatus==='error'   ? '⚠️' 
                  : '☁️';

  return (
    <div className="app">
      {showCloud && <CloudModal onClose={()=>setShowCloud(false)} onSaved={handleCloudSaved} initialToken={ghToken} initialGistId={gistId}/>}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-mark">
            <div className="logo-icon"><Icon name="book" size={17}/></div>
            <span className="logo-text">Book Builder</span>
          </div>
        </div>
        <nav className="sidebar-nav">
          <div className="nav-section">
            <div className="nav-label">Menu</div>
            <button className={`nav-item ${!currentProjectId?'active':''}`} onClick={()=>setCurrentProjectId(null)}>
              <Icon name="home" size={15}/>Dashboard
            </button>
            {currentProject && (
              <button className="nav-item active">
                <Icon name="layers" size={15}/>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{currentProject.title}</span>
              </button>
            )}
          </div>
          {projects.length > 0 && (
            <div className="nav-section">
              <div className="nav-label">Projetos recentes</div>
              {projects.slice(-5).reverse().map(p => (
                <button key={p.id} className={`nav-item ${currentProjectId===p.id?'active':''}`} onClick={()=>setCurrentProjectId(p.id)}>
                  <Icon name="book" size={14}/>
                  <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13}}>{p.title}</span>
                </button>
              ))}
            </div>
          )}
          <div className="nav-section">
            <button className="nav-item" onClick={()=>setShowCloud(true)}>
              <span style={{fontSize:14}}>{ghToken ? '☁️' : '⚙️'}</span>
              {ghToken ? 'Nuvem conectada' : 'Configurar nuvem'}
            </button>
          </div>
        </nav>
        <div className="sidebar-user" style={{padding:'12px',borderTop:'1px solid rgba(255,255,255,.06)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 10px'}}>
            <div className="logo-icon" style={{width:28,height:28,borderRadius:6,flexShrink:0}}><Icon name="book" size={13}/></div>
            <span style={{fontSize:12,color:'rgba(255,255,255,.35)',flex:1}}>Book Builder v1.0</span>
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="topbar">
          <span className="topbar-title">{currentProject ? currentProject.title : 'Dashboard'}</span>
          <div className="topbar-actions">
            <button className="btn btn-secondary btn-sm" onClick={()=>setShowCloud(true)}
              title={cloudMsg || 'Configurar sincronização na nuvem'}
              style={{gap:6, color: cloudStatus==='error'?'#B91C1C': cloudStatus==='ok'?'var(--green)':'var(--text2)'}}>
              {cloudIcon}
              {ghToken ? (cloudStatus==='syncing'?'Salvando…': cloudStatus==='ok'?'Nuvem OK': cloudStatus==='error'?'Erro nuvem':'Nuvem') : 'Configurar nuvem'}
            </button>
            <span style={{fontSize:12,color:'var(--text2)',background:'var(--bg)',padding:'5px 10px',borderRadius:6,border:'1px solid var(--border)'}}>
              {projects.length} {projects.length===1?'projeto':'projetos'}
            </span>
          </div>
        </div>
        <div className="content">
          {!currentProject ? (
            <Dashboard projects={projects} onOpen={setCurrentProjectId} onCreate={createProject} onEdit={editProject} onDelete={deleteProject}/>
          ) : (
            <ProjectEditor key={currentProject.id} project={currentProject} onBack={()=>setCurrentProjectId(null)} onUpdate={updateProject}/>
          )}
        </div>
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

<!-- Service Worker: cache + auto-update ao abrir o app -->
<script>
if ('serviceWorker' in navigator) {
  // Registra um SW inline via blob URL
  const swCode = `
const CACHE = 'book-builder-v1';
const ASSETS = [self.location.pathname || '/'];

self.addEventListener('install', e => {
  e.waitUntil(
    caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting())
  );
});

self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});

// Network first, fallback to cache — garante que atualizações chegam imediatamente
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request)
      .then(res => {
        if (res && res.status === 200) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      })
      .catch(() => caches.match(e.request))
  );
});

// Avisa os clientes quando uma nova versão está disponível
self.addEventListener('message', e => {
  if (e.data === 'skipWaiting') self.skipWaiting();
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl).then(reg => {
    // Verifica atualização ao abrir
    reg.addEventListener('updatefound', () => {
      const newWorker = reg.installing;
      newWorker.addEventListener('statechange', () => {
        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
          // Nova versão disponível — mostra toast
          const toast = document.createElement('div');
          toast.innerHTML = `
            <div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#18171A;color:#fff;
              padding:12px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;
              display:flex;align-items:center;gap:12px;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:9999;white-space:nowrap">
              🔄 Nova versão disponível
              <button onclick="newWorker.postMessage('skipWaiting');location.reload()" style="background:#B45309;border:none;
                color:#fff;padding:5px 12px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit">
                Atualizar
              </button>
            </div>`;
          document.body.appendChild(toast);
          // Auto-atualiza após 3s se usuário não interagir
          setTimeout(() => { newWorker.postMessage('skipWaiting'); location.reload(); }, 4000);
        }
      });
    });
  }).catch(() => {}); // falha silenciosa se offline
}

// Instala como PWA: mostra dica no iOS após 3s se ainda não instalado
setTimeout(() => {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
  const dismissed = localStorage.getItem('bb_install_dismissed');
  if (isIOS && !isStandalone && !dismissed) {
    const banner = document.createElement('div');
    banner.innerHTML = `
      <div id="install-banner" style="position:fixed;bottom:0;left:0;right:0;background:#18171A;color:#fff;
        padding:16px 20px 28px;font-family:'DM Sans',sans-serif;z-index:9999;
        border-top:1px solid rgba(255,255,255,.1);box-shadow:0 -4px 20px rgba(0,0,0,.3)">
        <button onclick="document.getElementById('install-banner').remove();localStorage.setItem('bb_install_dismissed','1')"
          style="position:absolute;top:12px;right:16px;background:transparent;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;line-height:1">×</button>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
          <div style="width:40px;height:40px;background:#B45309;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📚</div>
          <div>
            <div style="font-weight:600;font-size:15px">Instalar Book Builder</div>
            <div style="font-size:12px;color:rgba(255,255,255,.5)">Adicionar à tela de início</div>
          </div>
        </div>
        <div style="font-size:13px;color:rgba(255,255,255,.6);line-height:1.6">
          Toque em <strong style="color:#FCD34D">Compartilhar</strong> 
          (<span style="font-size:16px">⎙</span>) e depois em 
          <strong style="color:#FCD34D">"Adicionar à Tela de Início"</strong> para instalar como app.
        </div>
      </div>`;
    document.body.appendChild(banner);
  }
}, 3000);
